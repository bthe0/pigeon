<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{.Title}}</title>
    <style>
        body {
            margin: 0;
            font: 16px/1.5 Inter, system-ui, sans-serif;
            background: #f7f7f7;
            color: #111;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }
        main {
            max-width: 560px;
            background: #fff;
            border: 1px solid #e5e5e5;
            padding: 32px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 26px;
        }
        p {
            margin: 0;
            color: #666;
        }
    </style>
</head>
<body>
    <main>
        <h1>{{.Title}}</h1>
        <p>{{.Message}}</p>
    </main>
</body>
</html>
