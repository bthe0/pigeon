{{define "password_default_css"}}<style>
    :root {
        --bg: #0b0d0c;
        --panel: #111412;
        --border: #222522;
        --text: #d8ddd9;
        --text-dim: #9ba39c;
        --accent: #00e87a;
        --red: #ff5d5d;
    }
    body {
        margin: 0;
        background: radial-gradient(circle at top, #162119, #0b0d0c 60%);
        color: var(--text);
        font: 16px/1.5 Inter, system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
    }
    main {
        width: min(620px, 100%);
        background: rgba(17,20,18,.96);
        border: 1px solid var(--border);
        padding: 32px;
        border-radius: 18px;
        box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    .eyebrow {
        font-size: 11px;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 12px;
    }
    h1 {
        margin: 0 0 10px;
        font-size: 30px;
    }
    .msg {
        margin: 0 0 18px;
        color: var(--text-dim);
    }
    .err {
        margin: 0 0 14px;
        color: var(--red);
    }
    .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }
    input, button {
        font: inherit;
        padding: 11px 12px;
        border-radius: 10px;
    }
    input {
        min-width: 220px;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
    }
    button {
        border: none;
        background: var(--accent);
        color: #000;
        font-weight: 700;
        cursor: pointer;
    }
</style>{{end}}
