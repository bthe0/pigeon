<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{.Title}}</title>
    <style>
        :root {
            --bg: #0b0d0c;
            --panel: #111412;
            --border: #222522;
            --text: #d8ddd9;
            --text-dim: #9ba39c;
            --accent: #00e87a;
            --red: #ff5d5d;
        }
        body {
            margin: 0;
            background: radial-gradient(circle at top, #162119, #0b0d0c 60%);
            color: var(--text);
            font: 16px/1.5 Inter, system-ui, sans-serif;
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 24px;
        }
        main {
            width: min(620px, 100%);
            background: rgba(17,20,18,.96);
            border: 1px solid var(--border);
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 12px 40px rgba(0,0,0,.25);
        }
        .eyebrow {
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 30px;
        }
        .msg {
            margin: 0 0 18px;
            color: var(--text-dim);
        }
        .err {
            margin: 0 0 14px;
            color: var(--red);
        }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        input, button {
            font: inherit;
            padding: 11px 12px;
            border-radius: 10px;
        }
        input {
            min-width: 220px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
        }
        button {
            border: none;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <div class="eyebrow">Protected Tunnel</div>
        <h1>{{.Title}}</h1>
        <p class="msg">{{.Message}}</p>
        {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
        <form method="post">
            <div class="row">
                <input autofocus type="password" name="pigeon_password" placeholder="Password" />
                <button type="submit">Unlock</button>
            </div>
        </form>
    </main>
</body>
</html>
