<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{.Title}}</title>
    <style>
        body {
            margin: 0;
            font: 16px/1.5 Inter, system-ui, sans-serif;
            background: #f7f7f7;
            color: #111;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }
        main {
            max-width: 560px;
            background: #fff;
            border: 1px solid #e5e5e5;
            padding: 32px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 26px;
        }
        p {
            margin: 0 0 18px;
            color: #666;
        }
        .err {
            margin: 0 0 14px;
            color: #c62828;
        }
        input, button {
            font: inherit;
            padding: 10px 12px;
            border: 1px solid #d5d5d5;
        }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        button {
            cursor: pointer;
            background: #111;
            color: #fff;
        }
    </style>
</head>
<body>
    <main>
        <h1>{{.Title}}</h1>
        <p>{{.Message}}</p>
        {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
        <form method="post">
            <div class="row">
                <input autofocus type="password" name="pigeon_password" placeholder="Password" />
                <button type="submit">Unlock</button>
            </div>
        </form>
    </main>
</body>
</html>
