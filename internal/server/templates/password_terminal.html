<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{.Title}}</title>
    {{template "password_terminal_css" .}}
</head>
<body>
    <main>
        <h1>{{.Title}}</h1>
        <p>{{.Message}}</p>
        {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
        <form method="post">
            <div class="row">
                <input autofocus type="password" name="pigeon_password" placeholder="Password" />
                <button type="submit">Unlock</button>
            </div>
        </form>
    </main>
</body>
</html>
