<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pigeon — Control Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d0c;
    --panel: #111412;
    --panel2: #161917;
    --border: #222522;
    --border2: #2a2e2b;
    --accent: #00e87a;
    --accent-dim: #00e87a22;
    --accent-mid: #00e87a55;
    --red: #ff4d4d;
    --yellow: #f5c542;
    --blue: #4d9fff;
    --text: #d8ddd9;
    --text-dim: #6b7068;
    --text-mid: #9ba39c;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: var(--sans); color: var(--text); }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  @keyframes slideIn { from { transform: translateX(20px); opacity:0; } to { transform: translateX(0); opacity:1; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const STATUS_COLORS = { online: '#00e87a', offline: '#6b7068', error: '#ff4d4d' };
const PROTO_COLORS = { https: '#4d9fff', tcp: '#f5c542', http: '#9b8fff', udp: '#10b981' };
const METHOD_COLORS = { GET:'#4d9fff', POST:'#00e87a', PUT:'#f5c542', DELETE:'#ff4d4d', PATCH:'#c084fc', OPTIONS:'#6b7068' };
function statusColor(s) { return s >= 500 ? '#ff4d4d' : s >= 400 ? '#f5c542' : s >= 200 ? '#00e87a' : '#9ba39c'; }

// ── Icons ─────────────────────────────────────────────────────────────────────
const Icon = ({ d, size = 16, color = 'currentColor', style = {} }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={style}>
    {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}
  </svg>
);

const Icons = {
  tunnel:  'M 3 12 h 18 M 12 3 c-2.5 2.5-4 6-4 9s1.5 6.5 4 9 M 12 3 c2.5 2.5 4 6 4 9s-1.5 6.5-4 9',
  plus:    'M 12 5 v14 M 5 12 h14',
  stop:    'M 5 5 h14 v14 H 5z',
  play:    'M 5 3 l14 9-14 9 z',
  trash:   ['M 3 6 h18', 'M 8 6V4h8v2', 'M 19 6l-1 14H6L5 6'],
  copy:    ['M 8 8 H5a2 2 0 00-2 2v9a2 2 0 002 2h9a2 2 0 002-2v-3', 'M 8 8 V5a2 2 0 012-2h9a2 2 0 012 2v9a2 2 0 01-2 2h-3'],
  chevron: 'M 9 18 l6-6-6-6',
  activity:'M 22 12 h-4l-3 9L9 3l-3 9H2',
  log:     ['M 4 6 h16', 'M 4 10 h12', 'M 4 14 h16', 'M 4 18 h8'],
  settings:['M 12 15a3 3 0 100-6 3 3 0 000 6z', 'M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z'],
  link:    ['M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71', 'M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71'],
  x:       ['M18 6 6 18', 'M6 6l12 12'],
  check:   'M 20 6 L9 17 l-5-5',
  globe:   ['M 12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z', 'M2 12h20', 'M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z'],
  info:    ['M12 22a10 10 0 100-20 10 10 0 000 20z', 'M12 8v4', 'M12 16h.01'],
  zap:     'M 13 2 L 3 14 h9 l-1 8 10-12 h-9 z',
};

// ── Components ────────────────────────────────────────────────────────────────
function Pill({ children, color }) {
  return (
    <span style={{ fontFamily: 'var(--mono)', fontSize: 10, fontWeight: 500, letterSpacing: '.04em', padding: '2px 6px', border: `1px solid ${color}44`, color, background: color + '14', textTransform: 'uppercase' }}>
      {children}
    </span>
  );
}

function StatusDot({ status }) {
  const color = STATUS_COLORS[status] || '#6b7068';
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: color, boxShadow: status === 'online' ? `0 0 6px ${color}` : 'none', display: 'inline-block', flexShrink: 0, animation: status === 'online' ? 'pulse 2s ease infinite' : 'none' }} />
    </span>
  );
}

function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  return (
    <button onClick={e => { e.stopPropagation(); navigator.clipboard?.writeText(text).catch(()=>{}); setCopied(true); setTimeout(() => setCopied(false), 1500); }}
      style={{ background: 'none', border: 'none', cursor: 'pointer', color: copied ? 'var(--accent)' : 'var(--text-dim)', padding: '2px 4px', display: 'flex', alignItems: 'center', transition: 'color .15s' }}>
      <Icon d={copied ? Icons.check : Icons.copy} size={12} color="currentColor" />
    </button>
  );
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function Sidebar({ active, setActive }) {
  const nav = [
    { id: 'tunnels', icon: Icons.tunnel, label: 'Tunnels' },
    { id: 'inspector', icon: Icons.activity, label: 'Inspector' },
    { id: 'logs', icon: Icons.log, label: 'Logs' },
    { id: 'settings', icon: Icons.settings, label: 'Settings' },
  ];
  return (
    <div style={{ width: 200, background: 'var(--panel)', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
      {/* Logo */}
      <div style={{ padding: '20px 16px 16px', borderBottom: '1px solid var(--border)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ width: 24, height: 24, background: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon d={Icons.zap} size={14} color="#000" />
          </div>
          <span style={{ fontFamily: 'var(--mono)', fontWeight: 600, fontSize: 14, letterSpacing: '.06em', color: '#fff' }}>pigeon</span>
        </div>
        <div style={{ marginTop: 4, fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text-dim)' }}>tunnel agent connected</div>
      </div>

      <div style={{ padding: '10px 16px', borderBottom: '1px solid var(--border)' }}>
        <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 4, letterSpacing: '.06em', textTransform: 'uppercase', fontWeight: 500 }}>System</div>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--accent)', display: 'flex', alignItems: 'center', gap: 4 }}>
          <Icon d={Icons.globe} size={11} color="var(--accent)" />
          Local Agent
        </div>
      </div>

      <nav style={{ flex: 1, padding: '8px 0' }}>
        {nav.map(n => (
          <button key={n.id} onClick={() => setActive(n.id)}
            style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: '9px 16px', background: active === n.id ? 'var(--accent-dim)' : 'none', border: 'none', borderLeft: `2px solid ${active === n.id ? 'var(--accent)' : 'transparent'}`, cursor: 'pointer', color: active === n.id ? 'var(--accent)' : 'var(--text-dim)', fontSize: 13, fontFamily: 'var(--sans)', fontWeight: active === n.id ? 500 : 400, textAlign: 'left', transition: 'all .12s' }}>
            <Icon d={n.icon} size={15} color="currentColor" />
            {n.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

// ── Tunnels View ──────────────────────────────────────────────────────────────
function TunnelsView({ tunnels, reloadConfig, onSelectTunnel }) {
  const [newOpen, setNewOpen] = useState(false);
  const [form, setForm] = useState({ localAddr: '', domain: '', port: '', proto: 'http' });
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [isDeleting, setIsDeleting] = useState(false);
  const [isAdding, setIsAdding] = useState(false);

  const filtered = tunnels.filter(t => {
    const matchStatus = filter === 'all' || t.status === filter;
    const matchSearch = !search || t.localPort.includes(search) || t.publicUrl.includes(search);
    return matchStatus && matchSearch;
  });

  async function deleteTunnel(id) {
    if(!confirm("Are you sure you want to delete this forward?")) return;
    setIsDeleting(true);
    try {
      const res = await fetch(`/api/forwards/${id}`, { method: 'DELETE' });
      if(!res.ok) throw new Error(await res.text());
      await reloadConfig();
    } catch(err) {
      alert("Error deleting: " + err.message);
    }
    setIsDeleting(false);
  }

  async function addTunnel() {
    if (!form.localAddr) return;
    setIsAdding(true);
    try {
      const payload = {
        protocol: form.proto,
        local_addr: form.localAddr,
        domain: form.domain || undefined,
        remote_port: form.port ? parseInt(form.port) : 0
      };
      const res = await fetch(`/api/forwards`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if(!res.ok) throw new Error(await res.text());
      
      setForm({ localAddr: '', domain: '', port: '', proto: 'http' });
      setNewOpen(false);
      await reloadConfig();
    } catch(err) {
      alert("Error adding tunnel: " + err.message);
    }
    setIsAdding(false);
  }

  const statCounts = { all: tunnels.length, online: tunnels.filter(t=>t.status==='online').length, offline: tunnels.filter(t=>t.status==='offline').length };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: '#fff', letterSpacing: '-.01em' }}>Tunnels</div>
          <div style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 1 }}>{statCounts.all} active forwards</div>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
          style={{ background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '6px 10px', fontSize: 12, fontFamily: 'var(--sans)', width: 160, outline: 'none' }} />
        <button onClick={() => setNewOpen(true)}
          style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'var(--accent)', border: 'none', color: '#000', padding: '7px 14px', fontSize: 12, fontWeight: 600, cursor: 'pointer', letterSpacing: '.02em' }}>
          <Icon d={Icons.plus} size={13} color="#000" /> New Tunnel
        </button>
      </div>

      <div style={{ display: 'flex', gap: 0, padding: '0 24px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        {['all'].map(f => (
          <button key={f} onClick={()=>setFilter(f)}
            style={{ padding: '8px 14px', background: 'none', border: 'none', borderBottom: `2px solid ${filter===f?'var(--accent)':'transparent'}`, color: filter===f?'var(--accent)':'var(--text-dim)', fontSize: 12, cursor: 'pointer', fontFamily: 'var(--sans)', fontWeight: filter===f?500:400, textTransform: 'capitalize', marginBottom: -1, transition: 'all .12s' }}>
            {f} <span style={{ fontFamily: 'var(--mono)', fontSize: 10, marginLeft: 3, color: 'inherit', opacity: .7 }}>{statCounts[f]}</span>
          </button>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '16px 1fr 80px 100px 90px 90px 100px', gap: '0 12px', padding: '6px 24px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        {['', 'Local Target / URL', 'Proto', 'ID', 'Requests', 'Bandwidth', 'Actions'].map((h,i) => (
          <div key={i} style={{ fontSize: 10, fontWeight: 600, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--text-dim)' }}>{h}</div>
        ))}
      </div>

      <div style={{ flex: 1, overflowY: 'auto' }}>
        {filtered.map(t => (
          <TunnelRow key={t.id} tunnel={t} onDelete={deleteTunnel} onClick={() => onSelectTunnel(t)} isDeleting={isDeleting} />
        ))}
        {filtered.length === 0 && (
          <div style={{ padding: '40px 24px', textAlign: 'center', color: 'var(--text-dim)', fontSize: 13 }}>No tunnels found</div>
        )}
      </div>

      {newOpen && (
        <div style={{ position: 'absolute', inset: 0, background: '#00000088', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}
          onClick={() => !isAdding && setNewOpen(false)}>
          <div style={{ background: 'var(--panel)', border: '1px solid var(--border2)', width: 420, padding: 24 }} onClick={e=>e.stopPropagation()}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: '#fff' }}>New Tunnel</span>
              <button disabled={isAdding} onClick={() => setNewOpen(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-dim)' }}><Icon d={Icons.x} size={16} color="currentColor" /></button>
            </div>
            
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: 'block', fontSize: 11, color: 'var(--text-dim)', marginBottom: 4, letterSpacing: '.05em', textTransform: 'uppercase' }}>Protocol</label>
              <select value={form.proto} onChange={e => setForm(x => ({...x, proto: e.target.value}))} disabled={isAdding}
                style={{ width: '100%', background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '8px 10px', fontSize: 13, fontFamily: 'var(--mono)', outline: 'none' }}>
                <option value="http">HTTP</option>
                <option value="tcp">TCP</option>
                <option value="udp">UDP</option>
              </select>
            </div>
            
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: 'block', fontSize: 11, color: 'var(--text-dim)', marginBottom: 4, letterSpacing: '.05em', textTransform: 'uppercase' }}>Local Address</label>
              <input value={form.localAddr} onChange={e => setForm(x => ({...x, localAddr: e.target.value}))} placeholder="localhost:3000" disabled={isAdding}
                style={{ width: '100%', background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '8px 10px', fontSize: 13, fontFamily: 'var(--mono)', outline: 'none' }} />
            </div>
            
            {form.proto === 'http' ? (
              <div style={{ marginBottom: 14 }}>
                <label style={{ display: 'block', fontSize: 11, color: 'var(--text-dim)', marginBottom: 4, letterSpacing: '.05em', textTransform: 'uppercase' }}>Domain (Optional)</label>
                <input value={form.domain} onChange={e => setForm(x => ({...x, domain: e.target.value}))} placeholder="myapp.tunnel.dev" disabled={isAdding}
                  style={{ width: '100%', background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '8px 10px', fontSize: 13, fontFamily: 'var(--mono)', outline: 'none' }} />
              </div>
            ) : (
              <div style={{ marginBottom: 14 }}>
                <label style={{ display: 'block', fontSize: 11, color: 'var(--text-dim)', marginBottom: 4, letterSpacing: '.05em', textTransform: 'uppercase' }}>Remote Port (Optional)</label>
                <input type="number" value={form.port} onChange={e => setForm(x => ({...x, port: e.target.value}))} placeholder="0 for auto assign" disabled={isAdding}
                  style={{ width: '100%', background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '8px 10px', fontSize: 13, fontFamily: 'var(--mono)', outline: 'none' }} />
              </div>
            )}
            
            <button onClick={addTunnel} disabled={isAdding}
              style={{ width: '100%', background: isAdding ? 'var(--accent-mid)' : 'var(--accent)', border: 'none', color: '#000', padding: '10px', fontSize: 13, fontWeight: 600, cursor: 'pointer', letterSpacing: '.03em', marginTop: 10 }}>
              {isAdding ? 'Starting...' : 'Start Tunnel'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function TunnelRow({ tunnel: t, onDelete, onClick, isDeleting }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)} onClick={onClick}
      style={{ display: 'grid', gridTemplateColumns: '16px 1fr 80px 100px 90px 90px 100px', gap: '0 12px', padding: '10px 24px', borderBottom: '1px solid var(--border)', cursor: 'pointer', background: hovered ? 'var(--panel2)' : 'transparent', transition: 'background .1s', alignItems: 'center' }}>
      <StatusDot status={t.status} />
      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 13, fontWeight: 500, color: '#fff' }}>{t.localPort}</span>
          {t.tags.map(tag => <Pill key={tag} color={tag==='prod'?'#ff4d4d':tag==='db'?'#f5c542':'#4d9fff'}>{tag}</Pill>)}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 2 }}>
          <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-dim)' }}>{t.proto}://{t.publicUrl}</span>
          <CopyBtn text={`${t.proto}://${t.publicUrl}`} />
        </div>
      </div>
      <div><Pill color={PROTO_COLORS[t.proto] || '#9ba39c'}>{t.proto}</Pill></div>
      <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-dim)', letterSpacing: '1px' }}>{t.id}</div>
      <div style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-mid)' }}>{t.requests.toLocaleString()}</div>
      <div style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-mid)' }}>{t.bandwidth}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <button onClick={e=>{e.stopPropagation();onDelete(t.id);}} disabled={isDeleting}
          style={{ background: 'none', border: '1px solid var(--border2)', padding: '4px 6px', cursor: 'pointer', color: 'var(--text-dim)', display: 'flex', alignItems: 'center' }}>
          <Icon d={Icons.trash} size={11} color="currentColor" />
        </button>
      </div>
    </div>
  );
}

// ── Inspector View (Mock) ────────────────────────────────────────────────────────────
function InspectorView({ tunnels }) {
  return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-dim)' }}>
      <div style={{ textAlign: 'center' }}>
        <Icon d={Icons.activity} size={32} color="var(--border2)" style={{marginBottom: 10}} />
        <p>HTTP Inspector not natively supported by Pigeon yet.</p>
      </div>
    </div>
  );
}

// ── Logs View (Mock) ─────────────────────────────────────────────────────────────────
function LogsView() {
  return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-dim)' }}>
      <div style={{ textAlign: 'center' }}>
        <Icon d={Icons.log} size={32} color="var(--border2)" style={{marginBottom: 10}} />
        <p>Live remote streaming logs not yet implemented via Dashboard.</p>
        <p style={{fontSize:11, marginTop: 4}}>Use <code>pigeon logs</code> CLI.</p>
      </div>
    </div>
  );
}

// ── Settings View ─────────────────────────────────────────────────────────────
function SettingsView({ config }) {
  const [authToken, setAuthToken] = useState(config?.token || '');
  const [server, setServer] = useState(config?.server || '');
  const [showToken, setShowToken] = useState(false);
  const [restarting, setRestarting] = useState(false);

  async function applyRestart() {
    if(!confirm("Restart Pigeon Daemon using current config? (Changes require a restart)")) return;
    setRestarting(true);
    try {
      const res = await fetch('/api/restart', { method: 'POST' });
      if(!res.ok) throw new Error(await res.text());
      alert("Daemon restarted successfully.");
    } catch(err) {
      alert("Failed to restart daemon: " + err.message);
    }
    setRestarting(false);
  }

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: 32 }}>
      <div style={{ maxWidth: 600 }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: '#fff', marginBottom: 4 }}>Settings</div>
        <div style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 28 }}>Agent configuration and authentication</div>

        <Section title="Authentication & Server">
          <Field label="Auth Token" sub="Used to authenticate your tunnel agent">
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <input readOnly value={showToken ? authToken : '•'.repeat(Math.max(10, min(authToken?authToken.length:0, 20)))}
                style={{ flex: 1, background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '7px 10px', fontSize: 12, fontFamily: 'var(--mono)', outline: 'none' }} />
              <button onClick={() => setShowToken(x=>!x)} style={{ background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text-mid)', padding: '7px 10px', fontSize: 11, cursor: 'pointer', fontFamily: 'var(--sans)', whiteSpace: 'nowrap' }}>{showToken ? 'Hide' : 'Reveal'}</button>
            </div>
          </Field>
          
          <Field label="Server Address" sub="The upstream Pigeon server">
            <input readOnly value={server}
              style={{ width: '100%', background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '7px 10px', fontSize: 12, fontFamily: 'var(--mono)', outline: 'none' }} />
          </Field>
        </Section>
        
        <Section title="Actions">
          <Field label="Restart Daemon" sub="Applies any config changes added/removed.">
            <button onClick={applyRestart} disabled={restarting}
              style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '9px 20px', background: restarting ? 'var(--accent-dim)' : 'var(--accent)', border: 'none', color: restarting ? 'var(--accent)' : '#000', fontSize: 13, fontWeight: 600, cursor: 'pointer', letterSpacing: '.02em', transition: 'all .2s' }}>
              {restarting ? 'Restarting...' : 'Restart Now'}
            </button>
          </Field>
        </Section>
      </div>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ marginBottom: 28 }}>
      <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--text-dim)', marginBottom: 12, paddingBottom: 8, borderBottom: '1px solid var(--border)' }}>{title}</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>{children}</div>
    </div>
  );
}
function Field({ label, sub, children }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16 }}>
      <div style={{flex:1}}>
        <div style={{ fontSize: 13, color: 'var(--text)', fontWeight: 500 }}>{label}</div>
        {sub && <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 2 }}>{sub}</div>}
      </div>
      <div style={{ flexShrink: 0, minWidth: 200 }}>{children}</div>
    </div>
  );
}
function min(a,b) { return a < b ? a : b; }

// ── Tunnel Detail Panel ───────────────────────────────────────────────────────
function TunnelDetail({ tunnel, onClose }) {
  if (!tunnel) return null;
  return (
    <div style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: 360, background: 'var(--panel)', borderLeft: '1px solid var(--border2)', display: 'flex', flexDirection: 'column', zIndex: 50, animation: 'slideIn .18s ease' }}>
      <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
        <StatusDot status={tunnel.status} />
        <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: '#fff' }}>Local Target: {tunnel.localPort}</span>
        <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-dim)' }}><Icon d={Icons.x} size={16} color="currentColor" /></button>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: 20 }}>
        {[
          ['ID', tunnel.id],
          ['Public Endpoint', `${tunnel.proto}://${tunnel.publicUrl}`],
          ['Protocol', tunnel.proto.toUpperCase()],
          ['Status', tunnel.status],
          ['Requests', tunnel.requests.toLocaleString()],
          ['Bandwidth', tunnel.bandwidth],
        ].map(([k,v]) => (
          <div key={k} style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--text-dim)', marginBottom: 3 }}>{k}</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text)', wordBreak: 'break-all' }}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Stats Bar ─────────────────────────────────────────────────────────────────
function StatsBar({ tunnels, server }) {
  const online = tunnels.length;
  const totalReqs = tunnels.reduce((a, t) => a + t.requests, 0);
  return (
    <div style={{ display: 'flex', gap: 0, borderBottom: '1px solid var(--border)', flexShrink: 0, background: 'var(--panel)' }}>
      {[
        { label: 'Active Tunnels', value: `${online} connected`, accent: true },
        { label: 'Total Mocks', value: totalReqs.toLocaleString() },
        { label: 'Agent', value: 'v2.4.2' },
        { label: 'Pigeon Server', value: server || 'Unknown Server' },
      ].map((s, i) => (
        <div key={i} style={{ padding: '8px 24px', borderRight: '1px solid var(--border)', minWidth: 120 }}>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--text-dim)' }}>{s.label}</div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 13, fontWeight: 500, color: s.accent ? 'var(--accent)' : 'var(--text)', marginTop: 2 }}>{s.value}</div>
        </div>
      ))}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [activeNav, setActiveNav] = useState('tunnels');
  const [tunnels, setTunnels] = useState([]);
  const [rawConfig, setRawConfig] = useState(null);
  const [selectedTunnel, setSelectedTunnel] = useState(null);
  const [initError, setInitError] = useState(null);
  
  const loadConfig = async () => {
    try {
      const res = await fetch('/api/config');
      if(!res.ok) {
        const txt = await res.text();
        if(txt.includes('not initialised')) setInitError(txt);
        throw new Error(txt);
      }
      setInitError(null);
      const cfg = await res.json();
      setRawConfig(cfg);
      
      const parsedTunnels = (cfg.forwards || []).map(f => {
        let pubUrl = '';
        if (f.protocol === 'http') pubUrl = f.domain || '(auto domain)';
        else pubUrl = f.remote_port > 0 ? `Port ${f.remote_port}` : '(auto port)';
        
        return {
          id: f.id,
          name: f.id,
          proto: f.protocol,
          localPort: f.local_addr,
          publicUrl: pubUrl,
          status: 'online', // Implicit since config doesn't have live statuses per forward currently
          region: 'auto',
          requests: Math.floor(Math.random() * 500), // mock stat
          bandwidth: (Math.random() * 10).toFixed(1) + ' MB', // mock stat
          tags: [f.protocol]
        };
      });
      setTunnels(parsedTunnels);
      
    } catch(err) {
      console.error("Config fetch error", err);
    }
  };

  useEffect(() => {
    loadConfig();
  }, []);

  if (initError) {
    return (
      <div style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)', color: '#fff', flexDirection: 'column', gap: 20 }}>
        <Icon d={Icons.zap} size={48} color="var(--accent)" />
        <div style={{ fontSize: 24, fontWeight: 600 }}>Daemon Not Initialized</div>
        <div style={{ color: 'var(--text-mid)', fontFamily: 'var(--mono)', fontSize: 13, background: 'var(--panel)', padding: '16px 24px', border: '1px solid var(--border)' }}>
          {initError}
        </div>
        <button onClick={loadConfig} style={{ background: 'none', border: '1px solid var(--border2)', color: 'var(--text-dim)', padding: '8px 16px', cursor: 'pointer', marginTop: 10 }}>Retry Connection</button>
      </div>
    );
  }

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
      <StatsBar tunnels={tunnels} server={rawConfig?.server} />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative' }}>
        <Sidebar active={activeNav} setActive={v => { setActiveNav(v); setSelectedTunnel(null); }} />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
          {activeNav === 'tunnels' && <TunnelsView tunnels={tunnels} reloadConfig={loadConfig} onSelectTunnel={t => setSelectedTunnel(t)} />}
          {activeNav === 'inspector' && <InspectorView tunnels={tunnels} />}
          {activeNav === 'logs' && <LogsView />}
          {activeNav === 'settings' && <SettingsView config={rawConfig} />}
          {selectedTunnel && activeNav === 'tunnels' && <TunnelDetail tunnel={selectedTunnel} onClose={() => setSelectedTunnel(null)} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
