<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn:active { transform: translateY(1px); }

        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: var(--danger-hover); }

        .btn-success { background: var(--success); }
        
        .card {
            background: var(--surface);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            margin-bottom: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
        }

        td { font-size: 0.95rem; }

        tr:last-child td { border-bottom: none; }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input, select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        .badge {
            background: #475569;
            padding: 0.2rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-http { background: #3b82f6; }
        .badge-tcp { background: #8b5cf6; }
        .badge-udp { background: #10b981; }

        .server-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #toast.show {
            transform: translateY(0);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐦 Pigeon</h1>
            <button class="btn btn-success" onclick="restartDaemon()">⚡ Restart Daemon</button>
        </div>

        <div class="server-info" id="serverInfo">Loading server info...</div>

        <div class="card">
            <div class="card-header">Add New Forward</div>
            <form id="addForm" class="form-row" onsubmit="addForward(event)">
                <div class="form-group">
                    <label>Protocol</label>
                    <select id="protocol" onchange="handleProtocolChange()">
                        <option value="http">HTTP</option>
                        <option value="tcp">TCP</option>
                        <option value="udp">UDP</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Local Address</label>
                    <input type="text" id="localAddr" placeholder="localhost:3000" required>
                </div>
                <div class="form-group" id="domainGroup">
                    <label>Domain</label>
                    <input type="text" id="domain" placeholder="myapp.tun.example.com">
                </div>
                <div class="form-group" id="portGroup" style="display: none;">
                    <label>Remote Port</label>
                    <input type="number" id="remotePort" placeholder="0 for auto">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn" style="height: 38px;">Add Rule</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="card-header">Active Forwards</div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Protocol</th>
                        <th>Local Target</th>
                        <th>Remote Access</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="forwardsTable">
                    <tr><td colspan="5" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        document.addEventListener('DOMContentLoaded', loadConfig);

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.borderLeft = `4px solid ${isError ? 'var(--danger)' : 'var(--success)'}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                if (!res.ok) throw new Error(await res.text());
                const config = await res.json();
                
                document.getElementById('serverInfo').innerHTML = `Connected to server: <strong>${config.server}</strong>`;
                
                const tbody = document.getElementById('forwardsTable');
                if (!config.forwards || config.forwards.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No forwards configured.</td></tr>';
                    return;
                }

                tbody.innerHTML = config.forwards.map(f => `
                    <tr>
                        <td style="font-family: monospace; color: var(--text-muted)">${f.id}</td>
                        <td><span class="badge badge-${f.protocol}">${f.protocol}</span></td>
                        <td>${f.local_addr}</td>
                        <td style="color: var(--primary)">${formatRemote(f)}</td>
                        <td>
                            <button class="btn btn-danger" style="padding: 0.3rem 0.6rem; font-size: 0.8rem" onclick="deleteForward('${f.id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                showToast(err.message, true);
            }
        }

        function formatRemote(f) {
            if (f.protocol === 'http') return f.domain || '(auto subdomain)';
            if (f.remote_port) return `Port ${f.remote_port}`;
            return '(auto port)';
        }

        function handleProtocolChange() {
            const val = document.getElementById('protocol').value;
            document.getElementById('domainGroup').style.display = val === 'http' ? 'flex' : 'none';
            document.getElementById('portGroup').style.display = val === 'http' ? 'none' : 'flex';
        }

        async function addForward(e) {
            e.preventDefault();
            const payload = {
                protocol: document.getElementById('protocol').value,
                local_addr: document.getElementById('localAddr').value,
                domain: document.getElementById('domain').value,
                remote_port: parseInt(document.getElementById('remotePort').value) || 0
            };

            try {
                const res = await fetch('/api/forwards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(await res.text());
                
                showToast('Forward added successfully!');
                document.getElementById('localAddr').value = '';
                document.getElementById('domain').value = '';
                document.getElementById('remotePort').value = '';
                loadConfig();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        async function deleteForward(id) {
            if (!confirm('Are you sure you want to delete this forward?')) return;
            try {
                const res = await fetch(`/api/forwards/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error(await res.text());
                
                showToast('Forward deleted!');
                loadConfig();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        async function restartDaemon() {
            try {
                showToast('Restarting daemon...');
                const res = await fetch('/api/restart', { method: 'POST' });
                if (!res.ok) throw new Error(await res.text());
                showToast('Daemon restarted successfully!');
            } catch (err) {
                showToast(err.message, true);
            }
        }
    </script>
</body>
</html>
