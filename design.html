<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tunnelr — Control Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d0c;
    --panel: #111412;
    --panel2: #161917;
    --border: #222522;
    --border2: #2a2e2b;
    --accent: #00e87a;
    --accent-dim: #00e87a22;
    --accent-mid: #00e87a55;
    --red: #ff4d4d;
    --yellow: #f5c542;
    --blue: #4d9fff;
    --text: #d8ddd9;
    --text-dim: #6b7068;
    --text-mid: #9ba39c;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --accent-tweak: #00e87a;
  }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: var(--sans); color: var(--text); }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Tweaks panel */
  #tweaks-panel {
    display: none;
    position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    background: var(--panel2); border: 1px solid var(--border2);
    width: 220px; padding: 16px; font-family: var(--sans); font-size: 12px;
  }
  #tweaks-panel.open { display: block; }
  #tweaks-panel h4 { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 12px; }
  .tweak-row { margin-bottom: 10px; }
  .tweak-row label { display: block; color: var(--text-dim); font-size: 11px; margin-bottom: 4px; }
  .tweak-row input[type=color] { width: 100%; height: 28px; border: 1px solid var(--border2); background: var(--panel); cursor: pointer; }
  .tweak-row select { width: 100%; padding: 5px 6px; background: var(--panel); border: 1px solid var(--border2); color: var(--text); font-size: 11px; font-family: var(--sans); }
  .tweak-row input[type=range] { width: 100%; accent-color: var(--accent); }
</style>
</head>
<body>
<div id="root"></div>

<div id="tweaks-panel">
  <h4>Tweaks</h4>
  <div class="tweak-row">
    <label>Accent color</label>
    <input type="color" id="tw-accent" value="#00e87a" oninput="applyTweak('accent', this.value)" />
  </div>
  <div class="tweak-row">
    <label>Density</label>
    <select id="tw-density" onchange="applyTweak('density', this.value)">
      <option value="comfortable">Comfortable</option>
      <option value="compact" selected>Compact</option>
      <option value="dense">Dense</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>Font size</label>
    <input type="range" id="tw-size" min="11" max="15" value="13" step="1" oninput="applyTweak('fontSize', this.value)" />
  </div>
</div>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#3dffdf",
  "density": "compact",
  "fontSize": 13
}/*EDITMODE-END*/;

function applyTweak(key, val) {
  if (key === 'accent') {
    document.documentElement.style.setProperty('--accent', val);
    document.documentElement.style.setProperty('--accent-dim', val + '22');
    document.documentElement.style.setProperty('--accent-mid', val + '55');
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accentColor: val}}, '*');
  }
  if (key === 'density') {
    const map = {comfortable: '44px', compact: '36px', dense: '28px'};
    document.documentElement.style.setProperty('--row-h', map[val] || '36px');
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{density: val}}, '*');
  }
  if (key === 'fontSize') {
    document.documentElement.style.setProperty('--ui-size', val + 'px');
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{fontSize: Number(val)}}, '*');
  }
}

// Apply saved tweaks
applyTweak('accent', TWEAK_DEFAULTS.accentColor || '#00e87a');
applyTweak('density', TWEAK_DEFAULTS.density || 'compact');
applyTweak('fontSize', TWEAK_DEFAULTS.fontSize || 13);
if (document.getElementById('tw-accent')) document.getElementById('tw-accent').value = TWEAK_DEFAULTS.accentColor || '#00e87a';
if (document.getElementById('tw-density')) document.getElementById('tw-density').value = TWEAK_DEFAULTS.density || 'compact';
if (document.getElementById('tw-size')) document.getElementById('tw-size').value = TWEAK_DEFAULTS.fontSize || 13;

window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
});
window.parent.postMessage({type: '__edit_mode_available'}, '*');
</script>

// ── Components ────────────────────────────────────────────────────────────────
function Pill({ children, color }) {
  return (
    <span style={{ fontFamily: 'var(--mono)', fontSize: 10, fontWeight: 500, letterSpacing: '.04em', padding: '2px 6px', border: `1px solid ${color}44`, color, background: color + '14', textTransform: 'uppercase' }}>

    </span>

}

function StatusDot({ status }) {
  const color = STATUS_COLORS[status] || '#6b7068';
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: color, boxShadow: status === 'online' ? `0 0 6px ${color}` : 'none', display: 'inline-block', flexShrink: 0, animation: status === 'online' ? 'pulse 2s ease infinite' : 'none' }} />

  );
}

function CopyBtn({ text }) {

// ── Tunnels View ──────────────────────────────────────────────────────────────
function TunnelsView({ tunnels, setTunnels, onSelectTunnel }) {
  const [newOpen, setNewOpen] = useState(false);
  const [form, setForm] = useState({ name: '', port: '', proto: 'https', region: 'us-east' });
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const filtered = tunnels.filter(t => {
    const matchStatus = filter === 'all' || t.status === filter;
    const matchSearch = !search || t.name.includes(search) || t.localPort.toString().includes(search);
    return matchStatus && matchSearch;
  });

  function toggleTunnel(id) {
    setTunnels(ts => ts.map(t => t.id === id ? { ...t, status: t.status === 'online' ? 'offline' : 'online', latency: t.status === 'offline' ? Math.floor(Math.random() * 30) + 5 : null } : t));
  }
  function deleteTunnel(id) { setTunnels(ts => ts.filter(t => t.id !== id)); }
  function addTunnel() {
    if (!form.name || !form.port) return;
    const id = 'tun_' + Date.now();
    setTunnels(ts => [...ts, { id, name: form.name, proto: form.proto, localPort: Number(form.port), publicUrl: `${form.name}-${id.slice(-4)}.tunnelr.dev`, status: 'online', region: form.region, requests: 0, bandwidth: '0 B', latency: Math.floor(Math.random()*30)+5, created: 'just now', tags: [] }]);
    setForm({ name: '', port: '', proto: 'https', region: 'us-east' });
    setNewOpen(false);
  }

  const statCounts = { all: tunnels.length, online: tunnels.filter(t=>t.status==='online').length, offline: tunnels.filter(t=>t.status==='offline').length };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: '#fff', letterSpacing: '-.01em' }}>Tunnels</div>
          <div style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 1 }}>{statCounts.online} active · {statCounts.offline} offline</div>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
          style={{ background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '6px 10px', fontSize: 12, fontFamily: 'var(--sans)', width: 160, outline: 'none' }} />
        <button onClick={() => setNewOpen(true)}
          style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'var(--accent)', border: 'none', color: '#000', padding: '7px 14px', fontSize: 12, fontWeight: 600, cursor: 'pointer', letterSpacing: '.02em' }}>
          <Icon d={Icons.plus} size={13} color="#000" /> New Tunnel
        </button>
      </div>

      {/* Filter tabs */}
      <div style={{ display: 'flex', gap: 0, padding: '0 24px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        {['all','online','offline'].map(f => (
          <button key={f} onClick={()=>setFilter(f)}
            style={{ padding: '8px 14px', background: 'none', border: 'none', borderBottom: `2px solid ${filter===f?'var(--accent)':'transparent'}`, color: filter===f?'var(--accent)':'var(--text-dim)', fontSize: 12, cursor: 'pointer', fontFamily: 'var(--sans)', fontWeight: filter===f?500:400, textTransform: 'capitalize', marginBottom: -1, transition: 'all .12s' }}>
            {f} <span style={{ fontFamily: 'var(--mono)', fontSize: 10, marginLeft: 3, color: 'inherit', opacity: .7 }}>{statCounts[f]}</span>
          </button>
        ))}
      </div>

      {/* Table header */}
      <div style={{ display: 'grid', gridTemplateColumns: '16px 1fr 80px 100px 80px 90px 90px 100px', gap: '0 12px', padding: '6px 24px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        {['', 'Name / URL', 'Proto', 'Local Port', 'Region', 'Requests', 'Bandwidth', 'Actions'].map((h,i) => (
          <div key={i} style={{ fontSize: 10, fontWeight: 600, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--text-dim)' }}>{h}</div>
        ))}
      </div>

      {/* Rows */}
      <div style={{ flex: 1, overflowY: 'auto' }}>
        {filtered.map(t => (
          <TunnelRow key={t.id} tunnel={t} onToggle={toggleTunnel} onDelete={deleteTunnel} onClick={() => onSelectTunnel(t)} />
        ))}
        {filtered.length === 0 && (
          <div style={{ padding: '40px 24px', textAlign: 'center', color: 'var(--text-dim)', fontSize: 13 }}>No tunnels found</div>
        )}
      </div>

      {/* New Tunnel Modal */}
      {newOpen && (
        <div style={{ position: 'absolute', inset: 0, background: '#00000088', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}
          onClick={() => setNewOpen(false)}>
          <div style={{ background: 'var(--panel)', border: '1px solid var(--border2)', width: 420, padding: 24 }} onClick={e=>e.stopPropagation()}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: '#fff' }}>New Tunnel</span>
              <button onClick={() => setNewOpen(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-dim)' }}><Icon d={Icons.x} size={16} color="currentColor" /></button>
            </div>
            {[
              { label: 'Name', key: 'name', placeholder: 'my-api' },
              { label: 'Local Port', key: 'port', placeholder: '3000' },
            ].map(f => (
              <div key={f.key} style={{ marginBottom: 14 }}>
                <label style={{ display: 'block', fontSize: 11, color: 'var(--text-dim)', marginBottom: 4, letterSpacing: '.05em', textTransform: 'uppercase' }}>{f.label}</label>
                <input value={form[f.key]} onChange={e => setForm(x => ({...x, [f.key]: e.target.value}))} placeholder={f.placeholder}
                  style={{ width: '100%', background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '8px 10px', fontSize: 13, fontFamily: 'var(--mono)', outline: 'none' }} />
              </div>
            ))}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
              {[
                { label: 'Protocol', key: 'proto', options: ['https', 'http', 'tcp'] },
                { label: 'Region', key: 'region', options: ['us-east', 'eu-west', 'ap-south'] },
              ].map(f => (
                <div key={f.key}>

// ── Inspector View ────────────────────────────────────────────────────────────
function InspectorView({ tunnels }) {
  const [selected, setSelected] = useState(null);
  const [requests, setRequests] = useState(MOCK_REQUESTS);
  const [filterTunnel, setFilterTunnel] = useState('all');
  const [liveMode, setLiveMode] = useState(true);

  // Simulate incoming requests
  useEffect(() => {
    if (!liveMode) return;
    const methods = ['GET','POST','PUT','DELETE','PATCH'];
    const paths = ['/api/data','/api/users','/health','/api/items','/api/config','/webhook'];
    const statuses = [200,200,200,201,404,500,304];
    const tuns = tunnels.filter(t=>t.status==='online').map(t=>t.name);
    if (tuns.length === 0) return;
    const interval = setInterval(() => {
      const now = new Date();
      const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      const method = methods[Math.floor(Math.random()*methods.length)];
      const req = { id: 'r'+Date.now(), method, path: paths[Math.floor(Math.random()*paths.length)], status: statuses[Math.floor(Math.random()*statuses.length)], ms: Math.floor(Math.random()*200)+2, time: ts, tunnel: tuns[Math.floor(Math.random()*tuns.length)], ip: '10.0.0.'+Math.floor(Math.random()*254+1), size: (Math.random()*10).toFixed(1)+' KB' };
      setRequests(rs => [req, ...rs.slice(0, 49)]);
    }, 2500);
    return () => clearInterval(interval);
  }, [liveMode, tunnels]);

  const filtered = filterTunnel === 'all' ? requests : requests.filter(r => r.tunnel === filterTunnel);
  const onlineTunnels = tunnels.filter(t => t.status === 'online');

  return (
    <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
      {/* Left: request list */}
      <div style={{ flex: '0 0 480px', display: 'flex', flexDirection: 'column', borderRight: '1px solid var(--border)' }}>
        <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: '#fff' }}>Request Inspector</div>
            <div style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 1 }}>{filtered.length} requests captured</div>
          </div>
          <button onClick={() => setLiveMode(x=>!x)}
            style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '5px 10px', background: liveMode ? 'var(--accent-dim)' : 'var(--panel2)', border: `1px solid ${liveMode ? 'var(--accent-mid)' : 'var(--border2)'}`, color: liveMode ? 'var(--accent)' : 'var(--text-dim)', fontSize: 11, fontWeight: 600, cursor: 'pointer', letterSpacing: '.04em' }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: liveMode ? 'var(--accent)' : 'var(--text-dim)', display: 'inline-block', animation: liveMode ? 'pulse 1.5s ease infinite' : 'none' }} />
            {liveMode ? 'LIVE' : 'PAUSED'}
          </button>
          <select value={filterTunnel} onChange={e=>setFilterTunnel(e.target.value)}
            style={{ background: 'var(--panel2)', border: '1px solid var(--border2)', color: 'var(--text)', padding: '5px 8px', fontSize: 11, fontFamily: 'var(--mono)', outline: 'none' }}>
            <option value="all">All tunnels</option>
            {onlineTunnels.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
          </select>
        </div>

        {/* Column headers */}
        <div style={{ display: 'grid', gridTemplateColumns: '60px 60px 1fr 50px 50px', gap: '0 8px', padding: '5px 16px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
          {['Time','Method','Path','Status','Dur.'].map(h=>(
            <div key={h} style={{ fontSize: 10, fontWeight: 600, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--text-dim)' }}>{h}</div>
          ))}
        </div>

        <div style={{ flex: 1, overflowY: 'auto' }}>
          {filtered.map(r => (
            <div key={r.id} onClick={() => setSelected(r)}
              style={{ display: 'grid', gridTemplateColumns: '60px 60px 1fr 50px 50px', gap: '0 8px', padding: '8px 16px', borderBottom: '1px solid var(--border)', cursor: 'pointer', background: selected?.id === r.id ? 'var(--accent-dim)' : 'transparent', borderLeft: selected?.id === r.id ? '2px solid var(--accent)' : '2px solid transparent', transition: 'background .1s', alignItems: 'center' }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text-dim)' }}>{r.time}</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 10, fontWeight: 600, color: METHOD_COLORS[r.method] || '#9ba39c' }}>{r.method}</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.path}</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, fontWeight: 600, color: statusColor(r.status) }}>{r.status}</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text-dim)' }}>{r.ms}ms</span>
            </div>
          ))}
        </div>
      </div>

      {/* Right: request detail */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {selected ? (
          <>
            <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <Pill color={METHOD_COLORS[selected.method] || '#9ba39c'}>{selected.method}</Pill>
                <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: '#fff' }}>{selected.path}</span>
                <span style={{ fontFamily: 'var(--mono)', fontSize: 12, fontWeight: 600, color: statusColor(selected.status) }}>{selected.status}</span>
              </div>
              <div style={{ marginTop: 6, display: 'flex', gap: 16 }}>
                {[['Tunnel', selected.tunnel], ['IP', selected.ip], ['Duration', selected.ms+'ms'], ['Size', selected.size], ['Time', selected.time]].map(([k,v]) => (
                  <div key={k}>
                    <span style={{ fontSize: 10, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '.06em' }}>{k} </span>
                    <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-mid)' }}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: 24 }}>
              {[['Request Headers', {'Host': selected.tunnel+'.tunnelr.dev', 'User-Agent': 'curl/7.88.1', 'Accept': '*/*', 'X-Forwarded-For': selected.ip, 'X-Tunnelr-ID': selected.id}],
                ['Response Headers', {'Content-Type': 'application/json', 'X-Response-Time': selected.ms+'ms', 'Cache-Control': 'no-cache', 'Access-Control-Allow-Origin': '*'}],
                ['Response Body', null]
              ].map(([title, headers]) => (
                <div key={title} style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--text-dim)', marginBottom: 8 }}>{title}</div>
                  <div style={{ background: 'var(--panel2)', border: '1px solid var(--border)', padding: '12px 14px', fontFamily: 'var(--mono)', fontSize: 11, lineHeight: 1.7 }}>
                    {headers ? Object.entries(headers).map(([k,v]) => (
                      <div key={k}><span style={{color:'var(--text-dim)'}}>{k}: </span><span style={{color:'var(--text)'}}>{v}</span></div>
                    )) : (
                      <span style={{ color: 'var(--accent)' }}>{`{\n  "success": true,\n  "data": { ... }\n}`}</span>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </>
        ) : (
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-dim)', fontSize: 13, flexDirection: 'column', gap: 8 }}>
            <Icon d={Icons.activity} size={32} color="var(--border2)" />
            <span>Select a request to inspect</span>
          </div>
        )}
      </div>
    </div>
  );
}

function LogsView() {

      const now = new Date();
      const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      setLogs(ls => [{ t, level, msg: LEVEL_MSGS[Math.floor(Math.random()*LEVEL_MSGS.length)] }, ...ls.slice(0,99)]);
    }, 3000);
    return () => clearInterval(iv);
  }, [live]);

  const LEVEL_COLORS = { INFO: 'var(--text-mid)', WARN: 'var(--yellow)', ERROR: 'var(--red)', DEBUG: '#9b8fff' };

  return (

              {l}
            </button>
          ))}
        </div>
        <button onClick={() => setLive(x=>!x)}
          style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '5px 10px', background: live ? 'var(--accent-dim)' : 'var(--panel2)', border: `1px solid ${live ? 'var(--accent-mid)' : 'var(--border2)'}`, color: live ? 'var(--accent)' : 'var(--text-dim)', fontSize: 11, fontWeight: 600, cursor: 'pointer', letterSpacing: '.04em' }}>

          {live ? 'LIVE' : 'PAUSED'}
        </button>
        <button onClick={() => setLogs([])} style={{ background: 'none', border: '1px solid var(--border2)', padding: '5px 10px', color: 'var(--text-dim)', fontSize: 11, cursor: 'pointer', fontFamily: 'var(--sans)' }}>Clear</button>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 24px', fontFamily: 'var(--mono)', fontSize: 11.5, lineHeight: 1.8 }}>
        {filtered.map((l, i) => (
          <div key={i} style={{ display: 'flex', gap: 14, padding: '2px 0', borderBottom: '1px solid var(--border)10' }}>
            <span style={{ color: 'var(--text-dim)', flexShrink: 0, userSelect: 'none' }}>{l.t}</span>
            <span style={{ flexShrink: 0, fontWeight: 600, width: 40, color: LEVEL_COLORS[l.level] || 'var(--text-mid)' }}>{l.level}</span>
            <span style={{ color: l.level==='ERROR' ? 'var(--red)' : l.level==='WARN' ? 'var(--yellow)' : 'var(--text)' }}>{l.msg}</span>
          </div>
        ))}
        <div ref={bottomRef} />
      </div>
    </div>
  );
}

// ── Settings View ─────────────────────────────────────────────────────────────

  );
}
function Field({ label, sub, children }) {
  return (

        <div style={{ fontSize: 13, color: 'var(--text)', fontWeight: 500 }}>{label}</div>

      </div>
      <div style={{ flexShrink: 0 }}>{children}</div>
    </div>
  );
}
function Toggle({ value, onChange }) {
  return (
    <div onClick={() => onChange(!value)} style={{ width: 38, height: 20, background: value ? 'var(--accent)' : 'var(--border2)', borderRadius: 10, cursor: 'pointer', position: 'relative', transition: 'background .2s', flexShrink: 0 }}>
      <div style={{ width: 14, height: 14, borderRadius: '50%', background: '#fff', position: 'absolute', top: 3, left: value ? 21 : 3, transition: 'left .2s' }} />
    </div>
  );
}

// ── Tunnel Detail Panel ───────────────────────────────────────────────────────
function TunnelDetail({ tunnel, onClose }) {
  if (!tunnel) return null;
  return (
    <div style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: 360, background: 'var(--panel)', borderLeft: '1px solid var(--border2)', display: 'flex', flexDirection: 'column', zIndex: 50, animation: 'slideIn .18s ease' }}>
      <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
        <StatusDot status={tunnel.status} />
        <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: '#fff' }}>{tunnel.name}</span>
        <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-dim)' }}><Icon d={Icons.x} size={16} color="currentColor" /></button>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: 20 }}>
        {[
          ['Public URL', `${tunnel.proto}://${tunnel.publicUrl}`],
          ['Local Port', `:${tunnel.localPort}`],
          ['Protocol', tunnel.proto.toUpperCase()],
          ['Region', tunnel.region],
          ['Status', tunnel.status],
          ['Latency', tunnel.latency ? `${tunnel.latency}ms` : '—'],
          ['Requests', tunnel.requests.toLocaleString()],
          ['Bandwidth', tunnel.bandwidth],
          ['Created', tunnel.created],
        ].map(([k,v]) => (
          <div key={k} style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--text-dim)', marginBottom: 3 }}>{k}</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text)', wordBreak: 'break-all' }}>{v}</div>
          </div>
        ))}
        <div style={{ marginTop: 20 }}>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--text-dim)', marginBottom: 8 }}>CLI Command</div>
          <div style={{ background: 'var(--panel2)', border: '1px solid var(--border)', padding: '10px 12px', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--accent)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span>tunnelr http {tunnel.localPort}</span>
            <CopyBtn text={`tunnelr http ${tunnel.localPort}`} />
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Stats Bar ─────────────────────────────────────────────────────────────────
function StatsBar({ tunnels }) {
  const online = tunnels.filter(t => t.status === 'online').length;
  const totalReqs = tunnels.reduce((a, t) => a + t.requests, 0);
  const [uptime, setUptime] = useState(99.98);
  return (
    <div style={{ display: 'flex', gap: 0, borderBottom: '1px solid var(--border)', flexShrink: 0, background: 'var(--panel)' }}>
      {[
        { label: 'Active Tunnels', value: `${online} / ${tunnels.length}`, accent: true },
        { label: 'Total Requests', value: totalReqs.toLocaleString() },
        { label: 'Uptime', value: `${uptime}%` },
        { label: 'Agent', value: 'v2.4.1' },
        { label: 'Region', value: 'us-east-1' },
      ].map((s, i) => (
        <div key={i} style={{ padding: '8px 24px', borderRight: '1px solid var(--border)', minWidth: 120 }}>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--text-dim)' }}>{s.label}</div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 13, fontWeight: 500, color: s.accent ? 'var(--accent)' : 'var(--text)', marginTop: 2 }}>{s.value}</div>
        </div>
      ))}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [activeNav, setActiveNav] = useState('tunnels');
  const [tunnels, setTunnels] = useState(INITIAL_TUNNELS);
  const [selectedTunnel, setSelectedTunnel] = useState(null);

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
      <StatsBar tunnels={tunnels} />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative' }}>
        <Sidebar active={activeNav} setActive={v => { setActiveNav(v); setSelectedTunnel(null); }} />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
          {activeNav === 'tunnels' && <TunnelsView tunnels={tunnels} setTunnels={setTunnels} onSelectTunnel={t => setSelectedTunnel(t)} />}
          {activeNav === 'inspector' && <InspectorView tunnels={tunnels} />}
          {activeNav === 'logs' && <LogsView />}
          {activeNav === 'settings' && <SettingsView />}
          {selectedTunnel && activeNav === 'tunnels' && <TunnelDetail tunnel={selectedTunnel} onClose={() => setSelectedTunnel(null)} />}
        </div>
      </div>
      <style>{`
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
        @keyframes slideIn { from { transform: translateX(20px); opacity:0; } to { transform: translateX(0); opacity:1; } }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
